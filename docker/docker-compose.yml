services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: obsidian-mcp
    container_name: obsidian-mcp
    restart: unless-stopped
    user: "${HOST_UID}:${HOST_GID}"
    env_file:
      - ../.env
      - ../.env.local
    volumes:
      - ${VAULT_HOST_PATH}:/vault
    stdin_open: true
    tty: true

  bot:
    image: obsidian-mcp
    container_name: obsidian-bot
    restart: unless-stopped
    user: "${HOST_UID}:${HOST_GID}"
    env_file:
      - ../.env
      - ../.env.local
    volumes:
      - ${VAULT_HOST_PATH}:/vault
    command: obsidian-bot
    depends_on:
      - app
